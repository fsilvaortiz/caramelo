name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]
        include:
          # Sanity-check Node 22 only on Linux to keep CI minutes reasonable.
          - os: ubuntu-latest
            node-version: 22

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: unit

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Electron needs an X display on Linux runners; macOS / Windows ship
      # one. --error-file surfaces Xvfb's own startup failures instead of
      # letting them masquerade as opaque Electron crashes.
      - name: Run extension-host smoke tests (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a --error-file=/tmp/xvfb.err --server-args="-screen 0 1280x1024x24" npm run test:smoke

      - name: Upload Xvfb error log on failure
        if: failure() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: xvfb-error-log
          path: /tmp/xvfb.err
          if-no-files-found: ignore

      - name: Run extension-host smoke tests
        if: runner.os != 'Linux'
        run: npm run test:smoke
